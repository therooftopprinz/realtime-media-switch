# transport — two independent listener instances (distinct transport.local vs transport.public stacks):
#
# Local: plain UDP, loopback/link-local — for a reverse proxy that terminates HTTPS and relays browsers (e.g. via WebSocket) to this port.
#
# Public: Internet-facing endpoint; today this is plain UDP alongside local. Planned successor: udp_tls_transport (TLS) on this path only.
transport.local.enabled     = 1
transport.local.port        = 50000
transport.public.enabled    = 0

# identity
identity.challenge.bytes    = 32
identity_source.size        = 1
identity_source-0.type      = file
identity_source-0.file.path = identities.csv

# channel
channel.shared_limits.pkt_rate_limit = 100000

# switch
switch.client_idle_timeout_ms        = 120000
switch.ignore_indication_cooldown_ms = 1000
switch.response_min_latency_ms       = 100